<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LEDGR">
<meta name="theme-color" content="#060608">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LEDGR</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
[data-theme="dark"]{--bg:#060608;--surface:#0e0e14;--card:#13131c;--s2:#1a1a26;--s3:#202030;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.04);--text:#e8e8f0;--muted:#60607a;--muted2:#38384a;--modal-bg:rgba(0,0,0,0.8);--modal-card:#13131c;--green:#00d084;--red:#ff4060;--yellow:#f5c518;--blue:#4da8ff;--orange:#ff8c42;--purple:#a78bfa;--accent:#c8f060;}
[data-theme="light"]{--bg:#f5f5f0;--surface:#fff;--card:#fff;--s2:#f0f0ec;--s3:#e8e8e4;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.05);--text:#111118;--muted:#6b6b80;--muted2:#c0c0cc;--modal-bg:rgba(0,0,0,0.45);--modal-card:#fff;--green:#007a40;--red:#cc1033;--yellow:#b8860b;--blue:#1a6bc4;--orange:#c05a10;--purple:#6d28d9;--accent:#2d7a00;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:15px;line-height:1.5;min-height:100vh;}
.shell{display:flex;min-height:100vh;}
.sidebar{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.logo-mark{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:18px;letter-spacing:2px;}
.logo-mark span{color:var(--green);}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:3px;}
.dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-right:5px;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.nav{padding:10px 0;flex:1;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:all .12s;}
.nav-item:hover{color:var(--text);background:var(--s2);}
.nav-item.active{color:var(--text);border-left-color:var(--green);background:var(--s2);font-weight:500;}
.sidebar-foot{padding:14px 18px;border-top:1px solid var(--border);}
.btn-sync{width:100%;padding:9px;background:var(--green);color:#000;border:none;border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:6px;}
.btn-sync:disabled{opacity:.5;}
.btn-sec{width:100%;padding:8px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;margin-bottom:4px;}
.synced-at{font-size:10px;color:var(--muted2);margin-top:4px;font-family:'IBM Plex Mono',monospace;}
.topbar{display:none;position:sticky;top:0;z-index:200;height:52px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;padding:0 14px;gap:10px;}
.t-logo{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:17px;letter-spacing:2px;flex:1;}
.t-logo span{color:var(--green);}
.t-btn{background:var(--s2);border:1px solid var(--border);border-radius:18px;padding:5px 11px;font-size:14px;cursor:pointer;color:var(--text);}
.hamburger{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;}
.bottom-tabs{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:1px solid var(--border);padding:6px 0;}
.btabs{display:flex;}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;font-size:10px;color:var(--muted);cursor:pointer;border:none;background:none;}
.btab.active{color:var(--green);}
.btab-icon{font-size:18px;}
.overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.6);}
.overlay.open{display:block;}
.drawer{position:fixed;top:0;left:-100%;bottom:0;z-index:400;width:220px;background:var(--surface);border-right:1px solid var(--border);transition:left .2s;overflow-y:auto;display:flex;flex-direction:column;}
.drawer.open{left:0;}
.drawer-x{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:14px 16px;text-align:right;display:block;width:100%;}
.main{flex:1;min-width:0;padding:20px 24px 80px;}
.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:var(--modal-bg);backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;align-items:flex-end;justify-content:center;}
.modal-card{background:var(--modal-card);border-radius:18px 18px 0 0;width:100%;max-width:540px;padding:20px;max-height:82vh;overflow-y:auto;position:relative;}
.modal-x{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:3px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:14px;font-family:'IBM Plex Mono',monospace;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.panel-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
.panel-title{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.panel-action{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;}
.kpi:hover{background:var(--s2);}
.kpi-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.kpi-val{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:500;line-height:1;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:5px;}
.row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border2);}
.row:last-child{border-bottom:none;}
.row-label{font-size:13px;}
.row-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.row-amt{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;}
.expandable{cursor:pointer;}
.expandable:hover{background:var(--s2);margin:0 -4px;padding-left:4px;padding-right:4px;border-radius:6px;}
.expand-body{display:none;border-top:1px solid var(--border2);margin-top:4px;padding-top:4px;}
.expand-body.open{display:block;}
.cat-bar-row{display:flex;align-items:center;gap:10px;padding:6px 0;}
.cat-bar-label{font-size:13px;width:110px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-bar-track{flex:1;height:6px;background:var(--s3);border-radius:3px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:3px;}
.cat-bar-amt{font-family:'IBM Plex Mono',monospace;font-size:12px;width:66px;text-align:right;flex-shrink:0;}
.chart-wrap{position:relative;height:200px;margin-bottom:4px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;background:var(--s2);border:1px solid var(--border);margin:3px;}
.edit-btn{font-size:11px;color:var(--muted2);cursor:pointer;flex-shrink:0;padding:0 2px;background:none;border:none;}
.edit-btn:hover{color:var(--muted);}
.edited-badge{font-size:10px;color:var(--yellow);margin-left:4px;}
@media(max-width:700px){
  .sidebar{display:none;}
  .topbar{display:flex;}
  .bottom-tabs{display:block;}
  .main{padding:14px 14px 80px;}
  .two-col{grid-template-columns:1fr;}
  .kpi-row{grid-template-columns:1fr 1fr;}
  .kpi-val{font-size:18px;}
}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-x" onclick="closeDrawer()">x</button>
  <div class="logo" style="padding:14px 18px 12px"><div class="logo-mark">LED<span>GR</span></div></div>
  <div class="nav" id="drawer-nav"></div>
</div>
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal-card">
    <button class="modal-x" onclick="document.getElementById('modal').classList.remove('open')">x</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="shell">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-mark">LED<span>GR</span></div>
      <div class="logo-sub"><span class="dot"></span>Live via Plaid</div>
    </div>
    <div class="nav" id="sidebar-nav"></div>
    <div class="sidebar-foot">
      <button class="btn-sync" id="sync-btn" onclick="triggerSync()">Sync</button>
      <button class="btn-sec theme-btn-text" onclick="toggleTheme()" id="theme-sidebar">&#9790; Night</button>
      <div class="synced-at" id="synced-at">--</div>
    </div>
  </div>
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
    <div class="topbar">
      <button class="hamburger" onclick="openDrawer()">&#9776;</button>
      <div class="t-logo">LED<span>GR</span></div>
      <button class="t-btn theme-btn-icon" onclick="toggleTheme()" id="theme-topbar">&#9790;</button>
      <button class="t-btn" onclick="triggerSync()" id="sync-btn-top">&#9889;</button>
    </div>
    <div class="main" id="main-content">
      <div style="display:flex;align-items:center;justify-content:center;height:200px;font-size:13px;color:var(--muted);font-family:'IBM Plex Mono',monospace">Loading...</div>
    </div>
  </div>
</div>
<div class="bottom-tabs"><div class="btabs" id="bottom-tabs"></div></div>
<script>
var D = null, TAB = 'overview';
var BACKEND = 'https://realtimefin.replit.app';
var _rawD = null;
var CAT_OVERRIDES = {};
var REFUNDED_TXNS = {}; // key = "date|desc|amount", value = true
try {
  var savedR = localStorage.getItem('lgr_refunded');
  REFUNDED_TXNS = JSON.parse(savedR || '{}');
} catch(e) {}
try { 
  var saved = localStorage.getItem('lgr_cat_overrides');
  CAT_OVERRIDES = JSON.parse(saved || '{}');
  if(Object.keys(CAT_OVERRIDES).length) console.log('[LEDGR] Loaded', Object.keys(CAT_OVERRIDES).length, 'category overrides:', Object.keys(CAT_OVERRIDES));
} catch(e) { console.warn('[LEDGR] Failed to load overrides:', e); }
var ALL_CATS = ['Restaurants','Groceries','Amazon','Shopping','Gas/Travel','Kids','Entertainment','Subscription','Pharmacy','Healthcare','Insurance','Tax/Professional','Home Security','Religious','Other'];
var HOME_ST = ['NJ','NY','CT','PA','MA','MD','DE'];
var BILLING = ['APPLE','AMAZON','AMZN','VZWRLSS','VERIZON','SIMPLISAFE','PAYPAL','NETFLIX','SPOTIFY','HULU','ZEE5','ANTHROPIC','CLAUDE','NORD','TURBOTAX','GOOGLE','COMCAST'];
var BANK_SHORT = {'BofA':'BOA','Wells Fargo':'WF','TD Bank':'TD','Discover':'DISC','Robinhood':'RH','wifebofa':'BOA','myrobin':'RH'};
var CAT_COLORS = {
  'Restaurants':'#ff8c42','Groceries':'#c8f060','Amazon':'#4da8ff','Shopping':'#a78bfa',
  'Gas/Travel':'#67e8f9','Kids':'#60d0ff','Entertainment':'#c084fc','Subscription':'#818cf8','Subscription':'#818cf8',
  'Pharmacy':'#34d399','Healthcare':'#10b981','Insurance':'#f5c518','Tax/Professional':'#f87171',
  'Home Security':'#fb923c','Religious':'#e879f9','Other':'#6b6b80'
};
var PAGES = [
  {id:'overview',  label:'Overview',  icon:'&#9672;'},
  {id:'accounts',  label:'Accounts',  icon:'&#127974;'},
  {id:'travel',    label:'Travel',    icon:'&#9992;'},
  {id:'recurring', label:'Recurring', icon:'&#128260;'},
  {id:'search',    label:'Search',    icon:'&#128269;'}
];
var _tid = 0;
function uid() { return 'el' + (++_tid); }
function $(id) { return document.getElementById(id); }
function set(id, html) { var e = $(id); if(e) e.innerHTML = html; }
function fmt(n) { return '$' + Number(n||0).toLocaleString('en-US', {maximumFractionDigits:0}); }
function fmt2(n) { return '$' + Number(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function short(s) { return (s||'').replace(' 2026',' 26').replace(' 2025',' 25'); }
function expand(id) { var e = $(id); if(e) e.classList.toggle('open'); }

function saveOverrides() {
  try { 
    localStorage.setItem('lgr_cat_overrides', JSON.stringify(CAT_OVERRIDES));
    console.log('[LEDGR] Saved overrides:', CAT_OVERRIDES);
  } catch(e) { console.warn('[LEDGR] Failed to save overrides:', e); }
}
function saveRefunded() {
  try { localStorage.setItem('lgr_refunded', JSON.stringify(REFUNDED_TXNS)); } catch(e) {}
}
function toggleRefunded(date, desc, amount) {
  var key = desc; // desc-only key - survives date/amount changes across syncs
  if(REFUNDED_TXNS[key]) {
    delete REFUNDED_TXNS[key];
  } else {
    REFUNDED_TXNS[key] = true;
  }
  saveRefunded();
  // Re-apply dedup+overrides and re-render
  D = applyOverrides(deduplicateData(JSON.parse(JSON.stringify(_rawD))));
  render();
}
function isRefunded(date, desc, amount) {
  return !!REFUNDED_TXNS[desc]; // desc-only key matches toggleRefunded
}

function applyOverrides(data) {
  if(!data || !data.monthly_spending) return data;
  var msp = data.monthly_spending;
  Object.keys(msp).forEach(function(p) {
    var v = msp[p];
    (v.transactions || []).forEach(function(t) {
      // Key is desc only — applies GLOBALLY across all months and amounts
      var override = CAT_OVERRIDES[t.desc];
      if(override && override !== t.category) {
        v.categories[t.category] = (v.categories[t.category] || 0) - t.amount;
        if(v.categories[t.category] <= 0) delete v.categories[t.category];
        v.categories[override] = (v.categories[override] || 0) + t.amount;
        t.category = override;
      }
    });
  });
  return data;
}

function setCat(desc, cat) {
  if(cat === null) { delete CAT_OVERRIDES[desc]; }
  else { CAT_OVERRIDES[desc] = cat; }
  saveOverrides();
  // Verify it was actually saved
  try {
    var check = JSON.parse(localStorage.getItem('lgr_cat_overrides') || '{}');
    if(cat && !check[desc]) console.error('[LEDGR] Override NOT saved for:', desc);
    else console.log('[LEDGR] Override confirmed saved. Total:', Object.keys(check).length);
  } catch(e) {}
  D = applyOverrides(JSON.parse(JSON.stringify(_rawD)));
  $('modal').classList.remove('open');
  render();
}

function editCat(desc, amount, currentCat) {
  // Key is desc only — change applies to ALL transactions with same name globally
  var descEsc = desc.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  var curCat = CAT_OVERRIDES[desc] || currentCat;
  var b = '<div style="font-size:13px;color:var(--muted);margin-bottom:6px;word-break:break-word">' + desc + '</div>';
  b += '<div style="font-size:11px;color:var(--yellow);margin-bottom:12px">Applies globally to all \'' + desc + '\' transactions</div>';
  b += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">';
  var allCatsNow = ALL_CATS.slice();
  // Add any custom categories from overrides
  Object.values(CAT_OVERRIDES).forEach(function(cat) {
    if(allCatsNow.indexOf(cat) < 0) allCatsNow.push(cat);
  });
  allCatsNow.forEach(function(cat) {
    var col = CAT_COLORS[cat] || '#a78bfa';
    var active = cat === curCat;
    var catEsc = cat.replace(/'/g,"\\'");
    b += '<div onclick="setCat(\'' + descEsc + '\',\'' + catEsc + '\')" style="padding:9px 12px;border-radius:8px;border:1px solid ' + (active ? col : 'var(--border)') + ';background:' + (active ? col + '22' : 'var(--s2)') + ';cursor:pointer;font-size:13px;color:' + (active ? col : 'var(--muted)') + ';font-weight:' + (active ? '600' : '400') + '">' + cat + '</div>';
  });
  b += '</div>';
  // Custom category input
  b += '<div style="display:flex;gap:8px;margin-bottom:10px">';
  b += '<input id="custom-cat-input" placeholder="New category name..." style="flex:1;padding:8px 10px;background:var(--s2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:IBM Plex Mono,monospace;font-size:12px">';
  b += '<button onclick="addCustomCat(\'' + descEsc + '\')" style="padding:8px 14px;background:var(--green);color:#000;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Add</button>';
  b += '</div>';
  if(CAT_OVERRIDES[desc]) {
    b += '<button onclick="setCat(\'' + descEsc + '\',null)" style="font-size:12px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--s2);color:var(--muted);cursor:pointer">Reset to original</button>';
  }
  openModal('Recategorize', 'Global — affects all months', b);
}

function addCustomCat(desc) {
  var input = document.getElementById('custom-cat-input');
  var val = input ? input.value.trim() : '';
  if(!val) return;
  // Capitalize first letter of each word
  val = val.replace(/\b\w/g, function(c){return c.toUpperCase();});
  setCat(desc, val);
}

function txnLine(t, col, extraStyle) {
  var isEdited = !!CAT_OVERRIDES[t.desc];
  var isRefund = t.amount < 0;
  var effectiveCol = isRefund ? 'var(--green)' : col;
  var style = 'display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2);font-size:12px;' + (extraStyle || '');
  var bankLabel = '';
  if (t.bank) {
    var bankShort = BANK_SHORT[t.bank] || t.bank.substring(0,4).toUpperCase();
    bankLabel = '<span style="font-size:9px;font-family:IBM Plex Mono,monospace;color:var(--muted2);background:var(--s2);border-radius:3px;padding:1px 4px;flex-shrink:0;margin-right:2px">' + bankShort + '</span>';
  }
  if (t.mask) {
    bankLabel += '<span style="font-size:9px;font-family:IBM Plex Mono,monospace;color:var(--muted2);background:var(--s2);border-radius:3px;padding:1px 4px;flex-shrink:0;margin-right:2px">••' + t.mask + '</span>';
  }
  var manuallyRefunded = !!REFUNDED_TXNS[t.desc]; // desc-only
  var refundBadge = isRefund ? '<span style="font-size:9px;color:var(--green);background:rgba(0,208,132,0.12);border-radius:3px;padding:1px 5px;margin-left:4px">REFUND</span>' : '';
  var pendingBadge = t.pending ? '<span style="font-size:9px;color:var(--yellow);margin-left:3px">⏳</span>' : '';
  // Encode desc safely for inline onclick attribute
  var descEsc = t.desc.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  var catEsc = (CAT_OVERRIDES[t.desc] || t.category || 'Other').replace(/'/g,"\\'");
  var html = '<div style="' + style + (t.pending ? 'opacity:0.75;' : '') + '">';
  html += '<span style="font-family:IBM Plex Mono,monospace;color:var(--muted);width:40px;flex-shrink:0">' + (t.date || '') + '</span>';
  html += bankLabel;
  html += '<span style="flex:1;word-break:break-word;line-height:1.4;color:var(--muted)">' + t.desc + refundBadge + pendingBadge + (isEdited ? '<span class="edited-badge">*</span>' : '') + '</span>';
  html += '<span style="font-family:IBM Plex Mono,monospace;color:' + effectiveCol + ';white-space:nowrap;margin-right:6px">' + (isRefund ? '+' : '') + fmt2(Math.abs(t.amount)) + '</span>';
  // Refund toggle button
  var dateEsc = (t.date||'').replace(/'/g,"\'");
  var refundTitle = manuallyRefunded ? 'Undo refund mark' : 'Mark as refunded (hides from spending)';
  var refundIcon = manuallyRefunded ? '↩' : '⟳';
  var refundStyle = manuallyRefunded ? 'color:var(--green);' : 'color:var(--muted2);';
  var refundLabel = manuallyRefunded ? '↩' : '⟳';
  html += '<button class="edit-btn" style="' + refundStyle + 'margin-right:2px;font-size:13px" title="' + refundTitle + '" onclick="toggleRefunded(\'' + dateEsc + '\',\'' + descEsc + '\',' + t.amount + ')">' + refundLabel + '</button>'; // key stored as desc-only
  html += '<button class="edit-btn" onclick="editCat(\'' + descEsc + '\',' + t.amount + ',\'' + catEsc + '\')">&#9998;</button>';
  html += '</div>';
  return html;
}

function buildMonthlyCats(ms, period) {
  var v = ms[period];
  if (!v) return '<div style="color:var(--muted);font-size:13px;padding:8px 0">No data.</div>';
  var cats = Object.entries(v.categories || {}).sort(function(a,b){return b[1]-a[1];});
  var maxCat = cats.length ? cats[0][1] : 1;
  var html = '';
  cats.forEach(function(e, ci) {
    var col = CAT_COLORS[e[0]] || '#6b6b80';
    var pct = Math.round(e[1] / maxCat * 100);
    var txns = (v.transactions || []).filter(function(t){ return t.category === e[0]; }).sort(function(a,b){return b.date.localeCompare(a.date);});
    var cid = 'mc_' + period + '_' + ci;
    html += '<div>';
    html += '<div class="cat-bar-row expandable" onclick="expand(\'' + cid + '\')">';
    html += '<div class="cat-bar-label" style="color:' + col + '">' + e[0] + '</div>';
    html += '<div class="cat-bar-track"><div class="cat-bar-fill" style="width:' + pct + '%;background:' + col + '"></div></div>';
    html += '<div class="cat-bar-amt" style="color:' + col + '">' + fmt(e[1]) + '</div>';
    html += '</div>';
    html += '<div id="' + cid + '" class="expand-body">';
    txns.forEach(function(t){ html += txnLine(t, col, ''); });
    html += '</div></div>';
  });
  return html;
}

function selectMonth(period) {
  var ms = D.monthly_spending || {};
  var periods = Object.keys(ms).sort().reverse();
  // Update tab styles
  periods.forEach(function(p) {
    var tab = $('mtab_' + p);
    if (!tab) return;
    var isActive = p === period;
    tab.style.borderColor = isActive ? 'var(--green)' : 'var(--border)';
    tab.style.background = isActive ? 'rgba(0,208,132,0.12)' : 'var(--s2)';
    tab.style.color = isActive ? 'var(--green)' : 'var(--muted)';
  });
  // Update category bars
  var el = $('monthly-cats');
  if (el) el.innerHTML = buildMonthlyCats(ms, period);
  // Update total in panel head
  var v = ms[period];
  var actionEl = el ? el.closest('.panel') : null;
  if (actionEl) {
    var action = actionEl.querySelector('.panel-action');
    if (action) action.textContent = fmt(v ? v.total : 0);
  }
}

function buildNav() {
  var html = '';
  PAGES.forEach(function(p) {
    html += '<div class="nav-item' + (p.id === TAB ? ' active' : '') + '" onclick="switchTab(\'' + p.id + '\')">';
    html += '<span class="nav-icon">' + p.icon + '</span>' + p.label + '</div>';
  });
  set('sidebar-nav', html);
  set('drawer-nav', html);
  set('bottom-tabs', PAGES.map(function(p) {
    return '<button class="btab' + (p.id === TAB ? ' active' : '') + '" onclick="switchTab(\'' + p.id + '\')">'
      + '<span class="btab-icon">' + p.icon + '</span>' + p.label + '</button>';
  }).join(''));
}

function switchTab(id) { TAB = id; buildNav(); render(); }
function openDrawer() { $('drawer').classList.add('open'); $('overlay').classList.add('open'); }
function closeDrawer() { $('drawer').classList.remove('open'); $('overlay').classList.remove('open'); }
function openModal(title, sub, body) { set('modal-title', title); set('modal-sub', sub); set('modal-body', body); $('modal').classList.add('open'); }
function closeModal(e) { if(e.target === $('modal')) $('modal').classList.remove('open'); }
function toggleTheme() {
  var t = document.documentElement.getAttribute('data-theme');
  var next = t === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('lgr-theme', next);
  var sb = document.getElementById('theme-sidebar');
  var tb = document.getElementById('theme-topbar');
  if(sb) sb.innerHTML = next === 'dark' ? '&#9728; Day' : '&#9790; Night';
  if(tb) tb.innerHTML = next === 'dark' ? '&#9728;' : '&#9790;';
  if(_chartInst) { _chartInst.destroy(); _chartInst = null; }
  render();
}
(function() {
  var t = localStorage.getItem('lgr-theme') || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', t);
})();

function render() {
  if(!D) { set('main-content', '<div style="display:flex;align-items:center;justify-content:center;height:200px;font-size:13px;color:var(--muted);font-family:IBM Plex Mono,monospace">No data. Tap Sync.</div>'); return; }
  _tid = 0;
  if(TAB === 'overview') renderOverview();
  else if(TAB === 'accounts') renderAccounts();
  else if(TAB === 'travel') renderTravel();
  else if(TAB === 'recurring') renderRecurring();
  else if(TAB === 'search') renderSearch();
}

var _chartInst = null;

function renderOverview() {
  var ms = D.monthly_spending || {};
  var mh = D.monthly_history || [];
  var periods = Object.keys(ms).sort();
  var latest = periods[periods.length - 1] || '';
  var latestV = ms[latest] || {transactions:[], categories:{}, total:0, label:''};
  var nw = D.net_worth || {};
  var allAccts = D.all_accounts || [];

  var creditBal = allAccts.filter(function(a){return a.is_credit&&a.balance>0;}).reduce(function(s,a){return s+a.balance;},0);

  var html = '<div class="kpi-row">';

  html += mkKpi('CREDIT OWED', fmt(creditBal), 'var(--red)', 'cards balance', 'showCredit()');
  html += '</div>';

  // Chart data embedded in data attributes
  var chartLabels = JSON.stringify(periods.map(function(p){ return short(ms[p].label); }));
  var chartSpends = JSON.stringify(periods.map(function(p){ return ms[p].total || 0; }));
  var chartIncomes = JSON.stringify(periods.map(function(p){
    var entry = mh.find(function(m){ return m.period === p; });
    return entry ? Number(entry.income) || 0 : 0;
  }));
  html += '<div class="panel"><div class="panel-head"><div class="panel-title">Monthly Cash Flow</div><div class="panel-action">' + short(latestV.label) + '</div></div>';
  html += '<div class="chart-wrap"><canvas id="cfChart" data-l=\'' + chartLabels + '\' data-s=\'' + chartSpends + '\' data-i=\'' + chartIncomes + '\'></canvas></div></div>';

  // Pending transactions panel
  var pending = D.pending_transactions || [];
  if (pending.length) {
    html += '<div class="panel" style="border-color:rgba(245,197,24,0.3);background:rgba(245,197,24,0.04)">';
    html += '<div class="panel-head"><div class="panel-title" style="color:var(--yellow)">⏳ Pending · Not Yet Settled</div>';
    html += '<div class="panel-action" style="color:var(--yellow)">' + pending.length + ' transactions</div></div>';
    pending.forEach(function(t) {
      var col = CAT_COLORS[t.category] || '#6b6b80';
      var bankShort = {'BofA':'BOA','Wells Fargo':'WF','TD Bank':'TD','Discover':'DISC','Robinhood':'RH'}[t.bank] || (t.bank||'').substring(0,4).toUpperCase();
      html += '<div style="display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2);font-size:12px;opacity:0.8">';
      html += '<span style="font-family:IBM Plex Mono,monospace;color:var(--yellow);font-size:10px;width:40px;flex-shrink:0">PEND</span>';
      if(bankShort) html += '<span style="font-size:9px;font-family:IBM Plex Mono,monospace;color:var(--muted2);background:var(--s2);border-radius:3px;padding:1px 4px;flex-shrink:0">' + bankShort + '</span>';
      html += '<span style="flex:1;word-break:break-word;line-height:1.4;color:var(--muted)">' + t.desc + '</span>';
      html += '<span style="font-size:10px;color:'+col+';margin-right:6px">' + t.category + '</span>';
      html += '<span style="font-family:IBM Plex Mono,monospace;color:var(--yellow);white-space:nowrap">' + fmt2(t.amount) + '</span>';
      html += '</div>';
    });
    html += '<div style="font-size:10px;color:var(--muted);padding:6px 0 2px">These will appear in spending once settled (1-2 days)</div>';
    html += '</div>';
  }

  html += '<div class="two-col">';

  // Monthly Spend — months as columns, categories as rows
  var allCats = {};
  periods.forEach(function(p) {
    Object.keys(ms[p].categories || {}).forEach(function(c) { allCats[c] = true; });
  });
  var catList = Object.keys(allCats).sort(function(a,b) {
    var ta = periods.reduce(function(s,p){return s+(ms[p].categories[a]||0);},0);
    var tb = periods.reduce(function(s,p){return s+(ms[p].categories[b]||0);},0);
    return tb - ta;
  });
  var recentPeriods = periods.slice().reverse(); // newest first
  html += '<div class="panel" style="overflow-x:auto">';
  html += '<div class="panel-head"><div class="panel-title">Monthly Spend</div>';
  var grandTotal = periods.reduce(function(s,p){return s+(ms[p].total||0);},0);
  html += '<div class="panel-action">' + fmt(grandTotal) + ' total</div></div>';
  html += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
  html += '<thead><tr><th style="text-align:left;padding:6px 8px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);font-weight:500">Category</th>';
  recentPeriods.forEach(function(p) {
    html += '<th style="text-align:right;padding:6px 8px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;font-weight:500">' + short(ms[p].label) + '</th>';
  });
  html += '</tr></thead><tbody>';
  // Store txns globally for modal access - avoids JSON.stringify in onclick
  window._msTxns = window._msTxns || {};
  catList.forEach(function(cat, ci) {
    var col = CAT_COLORS[cat] || '#6b6b80';
    var rowTotal = periods.reduce(function(s,p){return s+(ms[p].categories[cat]||0);},0);
    if (!rowTotal) return;
    // Store all txns for this cat
    var allCatTxns = [];
    periods.forEach(function(p){
      (ms[p].transactions||[]).filter(function(t){return t.category===cat;}).forEach(function(t){
        allCatTxns.push(t);
      });
    });
    allCatTxns.sort(function(a,b){return b.date.localeCompare(a.date);});
    window._msTxns[cat] = allCatTxns;
    var catEsc = cat.replace(/'/g,"\'");
    var colEsc = col.replace(/'/g,"\'");
    html += '<tr>';
    html += '<td style="padding:6px 8px;border-bottom:1px solid var(--border2);font-weight:500;color:' + col + ';cursor:pointer" onclick="showStoredTxns(\'' + catEsc + '\',\'' + colEsc + '\')">' + cat + ' <span style="font-size:9px;color:var(--muted)">›</span></td>';
    recentPeriods.forEach(function(p) {
      var a = ms[p].categories[cat] || 0;
      if (a) {
        // Store per-month txns too
        var ptxns = (ms[p].transactions||[]).filter(function(t){return t.category===cat;});
        var key = cat+'|'+p;
        window._msTxns[key] = ptxns;
        var keyEsc = key.replace(/'/g,"\'");
        var title = cat + ' · ' + short(ms[p].label);
        var titleEsc = title.replace(/'/g,"\'");
        html += '<td style="padding:6px 8px;border-bottom:1px solid var(--border2);text-align:right;font-family:IBM Plex Mono,monospace;color:' + col + ';cursor:pointer" onclick="showStoredTxns(\'' + keyEsc + '\',\'' + colEsc + '\',\'' + titleEsc + '\')">' + fmt(a) + '</td>';
      } else {
        html += '<td style="padding:6px 8px;border-bottom:1px solid var(--border2);text-align:right;color:var(--muted2)">—</td>';
      }
    });
    html += '</tr>';
  });
  // Total row
  html += '<tr style="background:var(--s2)"><td style="padding:6px 8px;font-weight:600;font-size:11px">Total</td>';
  recentPeriods.forEach(function(p) {
    html += '<td style="padding:6px 8px;text-align:right;font-family:IBM Plex Mono,monospace;font-weight:600">' + fmt(ms[p].total||0) + '</td>';
  });
  html += '</tr></tbody></table></div>';

  // Recent transactions
  var allTxns = [];
  periods.slice().reverse().forEach(function(p){ (ms[p].transactions||[]).forEach(function(t){ allTxns.push({period:p,t:t}); }); });
  allTxns.sort(function(a,b){ return (b.period+b.t.date).localeCompare(a.period+a.t.date); });
  html += '<div class="panel"><div class="panel-head"><div class="panel-title">Recent Transactions</div></div>';
  allTxns.slice(0,10).forEach(function(item) {
    var t = item.t;
    var col = CAT_COLORS[t.category] || '#6b6b80';
    html += txnLine(t, col, '');
  });
  html += '</div>';
  html += '</div>';

  set('main-content', html);

  setTimeout(function() {
    var ctx = $('cfChart');
    if(!ctx) return;
    if(_chartInst) { _chartInst.destroy(); _chartInst = null; }
    var labels = JSON.parse(ctx.getAttribute('data-l') || '[]');
    var spends = JSON.parse(ctx.getAttribute('data-s') || '[]');
    var incomes = JSON.parse(ctx.getAttribute('data-i') || '[]');
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var gridCol = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
    var textCol = isDark ? '#60607a' : '#9ca3af';
    var datasets = [
      {label:'Spending', data:spends, borderColor:'#ff4060', backgroundColor:'rgba(255,64,96,0.08)', tension:.35, pointRadius:5, fill:true, borderWidth:2}
    ];
    var hasIncome = incomes.some(function(v){ return v > 0; });
    if(hasIncome) {
      datasets.push({label:'Income', data:incomes, borderColor:'#00d084', backgroundColor:'rgba(0,208,132,0.08)', tension:.35, pointRadius:5, fill:true, borderWidth:2});
    }
    _chartInst = new Chart(ctx, {
      type: 'line',
      data: {labels: labels, datasets: datasets},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: {position:'top', labels:{font:{family:'IBM Plex Mono',size:11}, color:textCol, boxWidth:12, padding:16}},
          tooltip: {callbacks:{label:function(c){return ' '+c.dataset.label+': '+fmt2(c.raw);}}}
        },
        scales: {
          x: {grid:{color:gridCol}, ticks:{font:{family:'IBM Plex Mono',size:11}, color:textCol}},
          y: {grid:{color:gridCol}, ticks:{font:{family:'IBM Plex Mono',size:11}, color:textCol, callback:function(v){return '$'+Number(v/1000).toFixed(0)+'k';}}}
        }
      }
    });
  }, 80);
}

function mkKpi(lbl, val, col, sub, fn) {
  return '<div class="kpi" onclick="' + fn + '"><div class="kpi-label">' + lbl + '</div><div class="kpi-val" style="color:' + col + '">' + val + '</div><div class="kpi-sub">' + sub + ' &rsaquo;</div></div>';
}
function acctLine(a) {
  var col = a.is_credit && a.balance > 0 ? 'var(--red)' : 'var(--green)';
  var sign = a.is_credit && a.balance > 0 ? '-' : '';
  var name = a.name.replace(/\s*\.\.\.\d{4}/g, '').trim();
  return '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border2);font-size:13px"><div><div>' + name + ' <span style="font-family:IBM Plex Mono,monospace;color:var(--muted)">xx' + a.mask + '</span></div><div style="font-size:11px;color:var(--muted)">' + a.bank + ' ' + a.subtype + '</div></div><div style="font-family:IBM Plex Mono,monospace;font-weight:500;color:' + col + '">' + sign + fmt2(Math.abs(a.balance)) + '</div></div>';
}
function showStoredTxns(key, col, title) {
  var txns = (window._msTxns && window._msTxns[key]) || [];
  var t = title || key.split('|')[0];
  showTxns(t, txns, col);
}

function showTxns(title, txns, col) {
  if(!txns || !txns.length) { openModal(title, 'No transactions', '<div style="color:var(--muted);font-size:13px;padding:12px 0">No transactions found.</div>'); return; }
  var total = txns.reduce(function(s,t){return s+(t.amount||0);},0);
  var sorted = txns.slice().sort(function(a,b){return ((b.period||'')+(b.date||'')).localeCompare((a.period||'')+(a.date||''));});
  var b = '<div style="font-family:IBM Plex Mono,monospace;font-size:18px;color:'+col+';margin-bottom:12px">'+fmt2(total)+'</div>';
  sorted.forEach(function(t){ b += txnLine(t, col, ''); });
  openModal(title, sorted.length+' transactions', b);
}

function showNetWorth() {
  var a = D.all_accounts || [];
  var b = '<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">ASSETS</div>';

  b += '<div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:12px 0 8px">CREDIT CARDS OWED</div>';

  openModal('Net Worth', 'All accounts', b);
}
function showChecking() {

function showCredit() {

function renderAccounts() {
  var allAccts = D.all_accounts || [];
  var ms = D.monthly_spending || {};
  var periods = Object.keys(ms).sort().reverse();
  var last2 = periods.slice(0,2);
  var html = '';
  var ALIAS = {'wifebofa':'BofA','myrobin':'Robinhood','bofa':'BofA','bofa_2':'BofA'};

  function normBank(b){ return ALIAS[b||''] || b || ''; }

  function monthTxnsForBank(p, bank) {
    var nb = normBank(bank);
    var all = ms[p] ? ms[p].transactions||[] : [];
    var hasBankField = all.some(function(t){return t.bank!=null;});
    if(!hasBankField) return all; // fallback - show all when bank missing
    return all.filter(function(t){ return normBank(t.bank)===nb || t.bank===bank; });
  }

  // ── CHECKING & SAVINGS ──
  var deposits = allAccts.filter(function(a){return !a.is_credit;});
  var bankOrder = []; deposits.forEach(function(a){if(bankOrder.indexOf(a.bank)<0)bankOrder.push(a.bank);});
  var depTotal = deposits.reduce(function(s,a){return s+a.balance;},0);

  html += '<div class="panel">';
  html += '<div class="panel-head"><div class="panel-title">Checking & Savings</div><div class="panel-action">'+fmt2(depTotal)+'</div></div>';

  bankOrder.forEach(function(bank) {
    var ba = deposits.filter(function(a){return a.bank===bank;});
    var bankTotal = ba.reduce(function(s,a){return s+a.balance;},0);
    var bid = uid();
    html += '<div>';
      html += '<div class="row expandable" onclick="expand(\''+bid+'\')">';

        html += '<div style="display:flex;align-items:center;gap:8px"><div class="row-amt" style="color:var(--green)">'+fmt2(bankTotal)+'</div><span style="color:var(--muted)">›</span></div>';
      html += '</div>';
      html += '<div id="'+bid+'" class="expand-body">';
        ba.forEach(function(a) {
          var name = a.name.replace(/\s*\.\.\.\d{4}/g,'').trim();
          var cid = uid();
          html += '<div>';
            html += '<div style="padding:7px 0 7px 14px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:baseline;font-size:13px;cursor:pointer" onclick="expand(\''+cid+'\')">';
              html += '<div><div>'+name+' <span style="font-family:IBM Plex Mono,monospace;color:var(--muted);font-size:11px">••'+a.mask+'</span></div>';
              html += '<div style="font-size:11px;color:var(--muted)">'+a.subtype+'</div></div>';
              html += '<div style="display:flex;align-items:center;gap:8px"><div style="font-family:IBM Plex Mono,monospace;font-weight:500;color:var(--green)">'+fmt2(a.balance)+'</div><span style="color:var(--muted);font-size:11px">› txns</span></div>';
            html += '</div>';
            html += '<div id="'+cid+'" class="expand-body">';
              var hadData = false;
              last2.forEach(function(p) {
                var ptxns = monthTxnsForBank(p, bank);
                if(!ptxns.length) return;
                hadData = true;
                html += '<div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);padding:5px 14px 2px;background:var(--s2)">'+ms[p].label+'</div>';
                ptxns.sort(function(a,b){return b.date.localeCompare(a.date);});
                ptxns.forEach(function(t){ html += txnLine(t, CAT_COLORS[t.category]||'#6b6b80', 'padding-left:14px;'); });
              });
              if(!hadData) html += '<div style="padding:8px 14px;font-size:12px;color:var(--muted)">No transactions in last 2 months</div>';
            html += '</div>';
          html += '</div>';
        });
      html += '</div>';
    html += '</div>';
    html += '<div class="divider"></div>';
  });
  html += '</div>';

  // ── SPENDING BY MONTH ──

  periods.forEach(function(p) {
    var v = ms[p]; var sid = uid();
    html += '<div>';
      html += '<div class="row expandable" onclick="expand(\''+sid+'\')">';

        html += '<div style="display:flex;align-items:center;gap:8px"><div class="row-amt" style="color:var(--red)">'+fmt2(v.total)+'</div><span style="color:var(--muted)">›</span></div>';
      html += '</div>';
      html += '<div id="'+sid+'" class="expand-body">';
        Object.entries(v.categories||{}).sort(function(a,b){return b[1]-a[1];}).forEach(function(ce) {
          var col = CAT_COLORS[ce[0]]||'#6b6b80'; var cid = uid();

        });
      html += '</div>';
    html += '</div>';
    html += '<div class="divider"></div>';

  html += '</div>';

function cleanZelleName(raw){
  if(!raw) return '';
  // Pattern 1: "payment from NAME for..." or "payment from NAME Conf#..."
  var m=raw.match(/payment from ([A-Z][A-Za-z\s]+?)(?:\s+for\s+|\s+Conf#|;)/i);
  if(m) return m[1].trim().toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});
  // Pattern 2: "FROM NAME Conf#..." (newer format)
  m=raw.match(/^FROM ([A-Z][A-Z\s]+?)(?:\s+Conf#|\s*$)/i);
  if(m) return m[1].trim().toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});
  // Pattern 3: TD received with name "Zelle NAME ..."
  m=raw.match(/Zelle ([A-Z][A-Z\s]{3,30})/i);
  if(m) return m[1].trim().toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});
  // Pattern 4: plain "payment from NAME"
  m=raw.match(/payment from ([A-Z][A-Za-z\s]{3,40})/i);
  if(m) return m[1].trim().toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});
  return raw.substring(0,30);
}

    (ms[p].transactions || []).forEach(function(t) {
      var key = (t.desc || '').trim().toUpperCase().substring(0, 40);
      if(!merchantMap[key]) merchantMap[key] = {desc:t.desc, cat:t.category, entries:[]};
      merchantMap[key].entries.push({period:p, label:ms[p].label, date:t.date, amount:t.amount, desc:t.desc, category:t.category});
    });

    allP.forEach(function(p) {
      var pt = zelleNames.reduce(function(s,n){ return s + (byName[n].months[p] ? byName[n].months[p].total : 0); }, 0);
      totRow += '<td style="padding:8px;text-align:right;font-family:IBM Plex Mono,monospace;font-weight:600;color:var(--green)">' + (pt ? fmt2(pt) : '-') + '</td>';
    });
    totRow += '<td style="padding:8px;text-align:right;font-family:IBM Plex Mono,monospace;font-weight:600;color:var(--green)">' + fmt2(zelleTotal) + '</td></tr>';
    html += totRow + '</tbody></table></div>';
  }
  html += '</div>';
  set('main-content', html);
}

function triggerSync() {
  var b = $('sync-btn'), bt = $('sync-btn-top');
  if(b) { b.textContent = 'Syncing...'; b.disabled = true; }
  if(bt) { bt.innerHTML = '&#8987;'; bt.disabled = true; }
  fetch(BACKEND + '/api/sync', {method:'POST'})
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if(d.success) { setTimeout(loadData, 2500); }
      else { alert('Sync error: ' + d.error); }
    })
    .catch(function(e){ alert('Cannot reach backend: ' + e.message); })
    .finally(function() {
      if(b) { b.textContent = 'Sync'; b.disabled = false; }
      if(bt) { bt.innerHTML = '&#9889;'; bt.disabled = false; }
    });
}

function deduplicateData(data) {
  if(!data || !data.monthly_spending) return data;
  Object.keys(data.monthly_spending).forEach(function(p) {
    var v = data.monthly_spending[p];
    // Step 1: Deduplicate by date+desc+amount
    var seen = {};
    var deduped = [];
    (v.transactions || []).forEach(function(t) {
      var key = t.date + '|' + t.desc + '|' + t.amount;
      if(!seen[key]) { seen[key] = true; deduped.push(t); }
    });
    // Step 1b: Rename legacy categories
  var CAT_RENAMES = {'Tech/Subs':'Subscription'};
  deduped.forEach(function(t) {
    if(CAT_RENAMES[t.category]) t.category = CAT_RENAMES[t.category];
  });

  // Step 2: Nullify purchase+refund pairs
    // For each refund (negative amount), find matching purchase (positive same desc)
    var nullified = {};
    deduped.forEach(function(t) {
      if(t.amount < 0) {
        // Find a matching positive transaction with same desc
        var match = deduped.find(function(p2) {
          return !nullified[p2.date+'|'+p2.desc+'|'+p2.amount]
            && p2.amount === Math.abs(t.amount)
            && p2.desc === t.desc
            && p2.amount > 0;
        });
        if(match) {
          // Mark both as nullified
          nullified[match.date+'|'+match.desc+'|'+match.amount] = true;
          nullified[t.date+'|'+t.desc+'|'+t.amount] = true;
          match.refund_matched = true;
          t.refund_matched = true;
        }
      }
    });
    // Step 3: Remove nullified pairs AND manually refunded transactions
    var final = deduped.filter(function(t) {
      if(t.refund_matched) return false;
      if(isRefunded(t.date, t.desc, t.amount)) return false; // key is desc-only
      return true;
    });
    // Step 4: Recalculate
    v.transactions = final;
    v.categories = {};
    v.total = 0;
    final.forEach(function(t) {
      if(t.amount > 0) { // only count purchases in totals
        v.categories[t.category] = (v.categories[t.category] || 0) + t.amount;
        v.total += t.amount;
      }
    });
  });
  return data;
}

function migrateOldOverrides() {
  // Migrate old keys that were "desc|amount" format to just "desc"
  var migrated = false;
  Object.keys(CAT_OVERRIDES).forEach(function(key) {
    if(key.indexOf('|') >= 0) {
      var desc = key.substring(0, key.lastIndexOf('|'));
      if(!CAT_OVERRIDES[desc]) {
        CAT_OVERRIDES[desc] = CAT_OVERRIDES[key];
        migrated = true;
      }
      delete CAT_OVERRIDES[key];
      migrated = true;
    }
  });
  if(migrated) saveOverrides();
}
migrateOldOverrides();

function renderSearch() {
  var html = '<div class="panel">';
  html += '<div class="panel-head"><div class="panel-title">Transaction Search</div></div>';
  html += '<div style="display:flex;gap:8px;margin-bottom:6px">';
  html += '<input id="srch-input" type="text" placeholder="restaurant, amazon, kavi, airbnb..." autocomplete="off" ';
  html += 'style="flex:1;padding:10px 14px;background:var(--s2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:IBM Plex Mono,monospace;font-size:13px" ';
  html += 'oninput="runSearch()" onkeydown="if(event.key===\'Enter\')runSearch()">';
  html += '<button onclick="runSearch()" style="padding:10px 16px;background:var(--green);color:#000;border:none;border-radius:8px;font-family:IBM Plex Mono,monospace;font-size:13px;font-weight:600;cursor:pointer">Go</button>';
  html += '</div>';
  html += '<div style="font-size:11px;color:var(--muted);margin-bottom:14px">Searches descriptions, categories, amounts, banks — across all months</div>';
  html += '</div>';
  html += '<div id="srch-results"></div>';
  set('main-content', html);
  // Focus input
  setTimeout(function(){ var el=document.getElementById('srch-input'); if(el) el.focus(); }, 100);
}

function runSearch() {
  var q = (document.getElementById('srch-input') || {}).value || '';
  q = q.trim().toLowerCase();
  var el = document.getElementById('srch-results');
  if(!el) return;
  if(q.length < 1) { el.innerHTML = ''; return; }

  var ms = D.monthly_spending || {};
  var words = q.split(/\s+/).filter(Boolean);

  // Category synonyms for smart matching
  var SYNONYMS = {
    'restaurant':'Restaurants','restaurants':'Restaurants','food':'Restaurants','dining':'Restaurants','eat':'Restaurants',
    'grocery':'Groceries','groceries':'Groceries','supermarket':'Groceries',
    'subscription':'Subscription','subscriptions':'Subscription','sub':'Subscription','subs':'Subscription',
    'entertainment':'Entertainment','streaming':'Entertainment',
    'shopping':'Shopping','shop':'Shopping','amazon':'Amazon',
    'gas':'Gas/Travel','travel':'Gas/Travel','uber':'Gas/Travel',
    'health':'Healthcare','healthcare':'Healthcare','medical':'Healthcare','pharmacy':'Pharmacy',
    'insurance':'Insurance','tax':'Tax/Professional',
  };

  var results = [];
  Object.keys(ms).sort().reverse().forEach(function(p) {
    var v = ms[p];
    (v.transactions||[]).forEach(function(t) {
      var score = 0;
      var tDesc = (t.desc||'').toLowerCase();
      var tCat = (t.category||'').toLowerCase();
      var tAmt = String(t.amount||'');
      var tBank = (t.bank||'').toLowerCase();

      words.forEach(function(w) {
        var syn = SYNONYMS[w];
        // Exact category match via synonym
        if(syn && t.category === syn) score += 10;
        // Description contains word
        if(tDesc.indexOf(w) >= 0) score += (tDesc.indexOf(w) === 0 ? 8 : 5);
        // Category contains word
        if(tCat.indexOf(w) >= 0) score += 4;
        // Amount matches
        if(tAmt.indexOf(w) >= 0) score += 3;
        // Bank matches
        if(tBank.indexOf(w) >= 0) score += 2;
      });

      if(score > 0) {
        results.push({t:t, period:p, label:v.label, score:score});
      }
    });
  });

  // Sort by score desc, then date desc
  results.sort(function(a,b){ return b.score-a.score || ((b.period+b.t.date).localeCompare(a.period+a.t.date)); });

  if(!results.length) {
    el.innerHTML = '<div class="panel" style="color:var(--muted);font-size:13px;padding:12px">No transactions found for "'+q+'"</div>';
    return;
  }

  var total = results.reduce(function(s,r){return s+(r.t.amount||0);},0);
  var html = '<div class="panel">';
  html += '<div class="panel-head"><div class="panel-title">'+results.length+' results</div>';
  html += '<div class="panel-action">'+fmt2(total)+' total</div></div>';

  // Group by month
  var byMonth = {};
  results.forEach(function(r){
    if(!byMonth[r.period]) byMonth[r.period] = {label:r.label, items:[]};
    byMonth[r.period].items.push(r);
  });

  Object.keys(byMonth).sort().reverse().forEach(function(p) {
    var mv = byMonth[p];
    var mid = uid();
    var mTotal = mv.items.reduce(function(s,r){return s+(r.t.amount||0);},0);
    html += '<div>';
    html += '<div class="row expandable" onclick="expand(\''+mid+'\')" style="background:var(--s2);padding:8px 12px;border-radius:6px;margin-bottom:4px">';
    html += '<div class="row-label" style="font-weight:500">'+mv.label+'</div>';
    html += '<div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:var(--muted)">'+mv.items.length+' txns</span><div class="row-amt" style="color:var(--red)">'+fmt2(mTotal)+'</div><span style="color:var(--muted)">›</span></div>';
    html += '</div>';
    html += '<div id="'+mid+'" class="expand-body">';
    mv.items.forEach(function(r){ html += txnLine(r.t, CAT_COLORS[r.t.category]||'#6b6b80', ''); });
    html += '</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function loadData() {
  fetch('https://raw.githubusercontent.com/VIMALZ1312/ledgr-realtime-app/main/data.json?t=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data) {
      // 1. Deduplicate first (fixes server-side duplication regardless of Replit version)
      data = deduplicateData(data);
      // 2. Store clean raw copy
      _rawD = JSON.parse(JSON.stringify(data));
      // 3. Apply category overrides on top
      D = applyOverrides(JSON.parse(JSON.stringify(_rawD)));
      buildNav();
      render();
      if(data.generated_at) {
        var dt = new Date(data.generated_at);
        var el = $('synced-at');
        if(el) el.textContent = dt.toLocaleString('en-US', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
      }
    })
    .catch(function(e){ set('main-content', '<div style="padding:20px;color:var(--red);font-size:13px">Failed to load data: ' + e + '</div>'); });
}

buildNav();
loadData();
</script>
