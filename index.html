<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>LEDGR Realtime — Vimal Raj</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#08080e;--surface:#0f0f17;--card:#121220;--s2:#191926;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.04);--text:#eeeef8;--muted:#5e5e7a;--muted2:#3e3e55;--modal-bg:rgba(0,0,0,0.75);--modal-card:#1a1a2a;}
[data-theme="light"]{--bg:#f4f4f0;--surface:#fff;--card:#fff;--s2:#f0f0ec;--border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.06);--text:#141420;--muted:#888898;--muted2:#aaaabc;--modal-bg:rgba(0,0,0,0.5);--modal-card:#fff;--accent:#5a9800;--blue:#0088bb;--pink:#c0005a;--warn:#c07000;--green:#007a50;--orange:#c05000;}
:root{--accent:#c8f060;--blue:#5dd8f5;--pink:#f05a9e;--warn:#f0a020;--green:#38d99a;--red:#f05a5a;--purple:#9f6cf5;--orange:#f07840;--teal:#38d9c8;--num:'Bebas Neue',sans-serif;--mono:'IBM Plex Mono',monospace;--head:'Syne',sans-serif;--sw:214px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-weight:300;min-height:100vh;font-size:13px;line-height:1.5;transition:background .3s,color .3s;}
.app{display:flex;min-height:100vh;}
.sidebar{width:var(--sw);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.logo-name{font-family:var(--head);font-weight:800;font-size:20px;}
.logo-name em{color:var(--accent);font-style:normal;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.live-dot{display:inline-block;width:7px;height:7px;background:var(--green);border-radius:50%;margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.nav{padding:8px 0;flex:1;}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 16px;font-size:11px;color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:all .15s;text-decoration:none;}
.nav-item:hover{color:var(--text);background:rgba(128,128,128,0.06);}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(200,240,96,0.04);}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);}
.btn-p{display:block;width:100%;padding:8px;background:var(--accent);color:#08080e;border:none;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:600;cursor:pointer;text-align:center;margin-bottom:6px;}
.btn-s{display:block;width:100%;padding:7px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:5px;font-family:var(--mono);font-size:10px;cursor:pointer;text-align:center;}
.topbar{display:none;position:sticky;top:0;z-index:200;height:50px;background:var(--surface);border-bottom:1px solid var(--border);align-items:center;padding:0 13px;gap:10px;}
.tlogo{font-family:var(--head);font-weight:800;font-size:18px;flex:1;}
.tlogo em{color:var(--accent);font-style:normal;}
.hamburger{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;}
.icon-btn{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:14px;cursor:pointer;}
.overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.6);}
.overlay.open{display:block;}
.drawer{position:fixed;top:0;left:-100%;bottom:0;z-index:400;width:220px;background:var(--surface);border-right:1px solid var(--border);transition:left .22s;overflow-y:auto;display:flex;flex-direction:column;}
.drawer.open{left:0;}
.drawer-x{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:12px 16px;text-align:right;display:block;}
.tabs-bar{display:none;position:sticky;top:50px;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0 12px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;}
.tabs-bar::-webkit-scrollbar{display:none;}
.main-tab{display:inline-block;padding:10px 13px;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;}
.main-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.main{flex:1;min-width:0;padding:20px 22px 56px;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;}
.ph2{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.ptitle{font-family:var(--head);font-weight:700;font-size:14px;}
.pact{font-size:9px;color:var(--muted);}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;}
.kpi-lbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.kpi-val{font-family:var(--num);font-size:28px;line-height:1;}
.kpi-period{font-size:8px;color:var(--muted2);margin-top:4px;padding:2px 6px;background:var(--s2);border-radius:8px;display:inline-block;}
.kpi-sub{font-size:9px;color:var(--muted);margin-top:3px;}
.acct-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border2);}
.acct-row:last-child{border-bottom:none;}
.acct-amt{font-family:var(--mono);font-weight:500;font-size:12px;}
.sym{font-size:9px;opacity:.7;}
.mtable{width:100%;border-collapse:collapse;font-size:10px;}
.mtable th{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:5px 6px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
.mtable th:first-child{text-align:left;}
.mtable td{padding:5px 6px;border-bottom:1px solid var(--border2);text-align:right;font-family:var(--mono);}
.mtable td:first-child{text-align:left;}
.mtable .zero{color:var(--muted2);}
.mtable .hot{cursor:pointer;}.mtable .hot:hover{opacity:.8;}
.mtable .total-row td{background:var(--s2);font-weight:600;border-top:1px solid var(--border);}
.txn-item{display:flex;gap:6px;padding:5px 0;border-bottom:1px solid var(--border2);font-size:10px;}
.txn-item:last-child{border-bottom:none;}
.txn-date{color:var(--muted2);white-space:nowrap;width:42px;flex-shrink:0;}
.txn-desc{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.txn-cat{font-size:9px;color:var(--muted2);white-space:nowrap;}
.txn-amt{font-family:var(--mono);font-weight:500;white-space:nowrap;}
.modal-bg{display:none;position:fixed;inset:0;z-index:500;background:var(--modal-bg);backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;align-items:flex-end;justify-content:center;}
.modal-card{background:var(--modal-card);border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:16px;max-height:80vh;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.modal-title{font-family:var(--head);font-weight:700;font-size:15px;margin-bottom:4px;}
.modal-sub{font-size:9px;color:var(--muted);margin-bottom:12px;}
.gen-tag{font-size:9px;color:var(--muted2);text-align:right;padding:4px 0;}
.sync-banner{background:rgba(200,240,96,0.08);border:1px solid rgba(200,240,96,0.2);border-radius:8px;padding:8px 12px;font-size:10px;color:var(--accent);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.cat-chip{display:inline-block;padding:1px 6px;border-radius:8px;font-size:8px;margin-right:3px;}
@media(max-width:640px){
  .sidebar{display:none;}.topbar{display:flex;}.tabs-bar{display:block;}
  .main{padding:14px 14px 60px;}.kpi-val{font-size:22px;}
  .mtable{font-size:9px;}.mtable th,.mtable td{padding:4px 3px;}
}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-x" onclick="closeDrawer()">✕</button>
  <div class="logo"><div class="logo-name"><em>LEDGR</em> RT</div></div>
  <div class="nav" id="drawer-nav"></div>
</div>
<div class="modal-bg" id="modal" onclick="closeModal(event)">
  <div class="modal-card">
    <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
  </div>
</div>
<div class="app">
  <div class="sidebar">
    <div class="logo">
      <div class="logo-name"><em>LEDGR</em> RT</div>
      <div class="logo-sub"><span class="live-dot"></span>Realtime · Plaid</div>
    </div>
    <div class="nav" id="sidebar-nav"></div>
    <div class="sidebar-foot">
      <button class="btn-p" onclick="triggerSync()" id="sync-btn">⚡ Sync Now</button>
      <button class="btn-s" onclick="loadData()" id="refresh-btn">↻ Refresh</button>
      <button class="btn-s" onclick="toggleTheme()" style="margin-top:4px">☀️ / 🌙</button>
      <div class="gen-tag" id="gen-tag">Loading...</div>
    </div>
  </div>
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
    <div class="topbar">
      <button class="hamburger" onclick="openDrawer()">☰</button>
      <div class="tlogo"><em>LEDGR</em> RT</div>
      <button class="icon-btn" onclick="triggerSync()" id="sync-btn-top">⚡</button>
      <button class="icon-btn" onclick="loadData()">↻</button>
    </div>
    <div class="tabs-bar" id="tabs-bar"></div>
    <div class="main" id="mc"><div style="display:flex;align-items:center;justify-content:center;height:200px;font-size:11px;color:var(--muted)">⟳ Loading...</div></div>
  </div>
</div>
<script>
// ── CONFIG ────────────────────────────────────────────────────
// Set your Replit backend URL here after deploying
var BACKEND_URL = 'https://realtimefin.replit.app';

var D=null, currentTab='overview';
var CAT_COLORS={'Restaurants':'#f07840','Groceries':'#c8f060','Amazon':'#5dd8f5','Shopping':'#9f6cf5','Gas/Travel':'#80b0ff','Kids':'#60c0ff','Entertainment':'#9f6cf5','Tech/Subs':'#b090ff','Pharmacy':'#38d9c8','Healthcare':'#38d9c8','Home Security':'#f0c040','Insurance':'#f0a020','Tax/Professional':'#f05a5a','Other':'#5e5e7a'};
var STATE_NAMES={'CA':'California','NC':'North Carolina','VA':'Virginia','DC':'Washington D.C.','TX':'Texas','FL':'Florida','TN':'Tennessee','MD':'Maryland','NY':'New York'};

var TABS=[
  {id:'overview',label:'◈ Overview'},{id:'spending',label:'💳 Spending'},
  {id:'transactions',label:'📋 Transactions'},{id:'recurring',label:'🔁 Recurring'},
  {id:'analytics',label:'📊 Analytics'},{id:'india',label:'🇮🇳 India'},
  {id:'travel',label:'✈️ Travel'}
];

function fmt(n){return '$'+Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0});}
function fmt2(n){return '$'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function short(s){return (s||'').replace('January','Jan').replace('February','Feb').replace('March','Mar').replace('April','Apr').replace('May','May').replace(' 2026','\'26').replace(' 2025','\'25');}
function cap(s){return s.replace(/\w\S*/g,function(t){return t.charAt(0).toUpperCase()+t.substr(1).toLowerCase();});}
function set(id,html){var e=document.getElementById(id);if(e)e.innerHTML=html;}

function buildNav(id,drawer){
  var html='';
  TABS.forEach(function(t){
    var fn=drawer?'switchTab(\''+t.id+'\');closeDrawer()':'switchTab(\''+t.id+'\')';
    html+='<a class="nav-item'+(t.id===currentTab?' active':'')+'" href="#" onclick="'+fn+'">'+t.label+'</a>';
  });
  set(id,html);
}
function buildTabsBar(){
  set('tabs-bar',TABS.map(function(t){return '<button class="main-tab'+(t.id===currentTab?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>';}).join(''));
}
function switchTab(id){currentTab=id;buildNav('sidebar-nav',false);buildNav('drawer-nav',true);buildTabsBar();renderAll();}
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('overlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('open');}
function toggleTheme(){var t=document.documentElement.getAttribute('data-theme');document.documentElement.setAttribute('data-theme',t==='dark'?'light':'dark');}
function openModal(title,sub,body){set('modal-title',title);set('modal-sub',sub);set('modal-body',body);document.getElementById('modal').classList.add('open');}
function closeModal(e){if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');}

function arow(name,period,balance,col,extra,isCredit){
  var sign=isCredit&&balance>0?'-':'';
  var color=isCredit&&balance>0?'var(--pink)':col;
  return '<div class="acct-row"><div><div style="font-size:10px;font-weight:500">'+name+'</div><div style="font-size:8px;color:var(--muted)">'+(period||'Live')+'</div></div><div class="acct-amt" style="color:'+color+'">'+sign+'<span class="sym">$</span>'+Number(Math.abs(balance||0)).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+(extra||'')+'</div></div>';
}

function renderAll(){
  if(!D){set('mc','<div style="display:flex;align-items:center;justify-content:center;height:200px;font-size:11px;color:var(--muted)">⟳ Loading...</div>');return;}
  ({overview:rOverview,spending:rSpending,transactions:rTransactions,recurring:rRecurring,analytics:rAnalytics,india:rIndia,travel:rTravel})[currentTab]();
}

// ── OVERVIEW ──────────────────────────────────────────────────
function rOverview(){
  var a=D.accounts,k=D.kpis,mh=D.monthly_history||[];
  var checkingBal=(a.bofa.balance||0)+(a.td.balance||0);
  var creditBal=(a.wf.balance||0)+(a.discover.balance||0);
  var netWorth=checkingBal-creditBal;

  var html='';
  // Sync banner
  if(D.source==='plaid_realtime'){
    var dt=new Date(D.generated_at);
    var ago=Math.round((Date.now()-dt)/60000);
    html+='<div class="sync-banner"><span><span class="live-dot"></span>Live via Plaid · '+ago+' min ago</span><button onclick="triggerSync()" style="background:none;border:none;color:var(--accent);font-size:10px;cursor:pointer;font-family:var(--mono)">Sync ↻</button></div>';
  }

  html+='<div class="kpi-grid">';
  html+=kpi('Net Worth',fmt(netWorth),netWorth>=0?'var(--accent)':'var(--pink)','Live','Checking − Credit cards');
  html+=kpi('Checking',fmt(checkingBal),'var(--blue)','Live','BofA + TD');
  html+=kpi('Credit Cards',fmt(creditBal),'var(--pink)','Live','WF + Discover (owed)');
  html+=kpi('India Obligations',fmt(k.india_total),'var(--warn)','Monthly est.','USD/mo');
  html+='</div>';

  html+='<div class="panel"><div class="ph2"><div class="ptitle">Account Balances</div></div>';
  html+=arow('BofA ••7309','Checking',a.bofa.balance,'var(--accent)');
  html+=arow('TD ••0069','Checking',a.td.balance,'var(--accent)');
  html+=arow('WF ••9762','Credit card',a.wf.balance,'var(--pink)','',true);
  html+=arow('Discover ••0494','Credit card',a.discover.balance,'var(--pink)','',true);
  html+='</div>';

  if(mh.length){
    html+='<div class="panel"><div class="ph2"><div class="ptitle">Income by Month</div><div class="pact">BofA + TD</div></div>';
    mh.slice(-4).reverse().forEach(function(m){
      html+='<div class="acct-row"><div><div style="font-size:10px;font-weight:500">'+m.period_label+'</div>';
      if(m.bofa_income||m.td_income) html+='<div style="font-size:8px;color:var(--muted)">BofA '+fmt(m.bofa_income)+' + TD '+fmt(m.td_income)+'</div>';
      html+='</div><div class="acct-amt" style="color:var(--accent)"><span class="sym">$</span>'+Number(m.income).toLocaleString('en-US',{minimumFractionDigits:2})+'</div></div>';
    });
    html+='</div>';
  }

  html+='<div class="panel"><div class="ph2"><div class="ptitle">ICICI India</div><div class="pact">PDF sync</div></div>';
  var is=a.icici_savings;
  html+=arow('ICICI ••000582','Savings',is.balance_usd,'var(--orange)');
  html+='</div>';
  html+='<div class="gen-tag" id="gen-main"></div>';
  set('mc',html);
  var el=document.getElementById('gen-main');
  if(el&&D.generated_at){var dt=new Date(D.generated_at);el.textContent='Synced '+dt.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})+' · '+D.statement_count;}
}
function kpi(lbl,val,col,period,sub){return '<div class="kpi"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val" style="color:'+col+'">'+val+'</div><div class="kpi-period">'+period+'</div><div class="kpi-sub">'+sub+'</div></div>';}

// ── SPENDING ──────────────────────────────────────────────────
function rSpending(){
  var ms=D.monthly_spending||{};
  var periods=Object.keys(ms).sort().filter(function(p){return ms[p].total>0;});
  if(!periods.length){set('mc','<div class="panel"><div style="font-size:10px;color:var(--muted)">No spending data yet — try syncing.</div></div>');return;}
  var allCats={};
  periods.forEach(function(p){Object.keys(ms[p].categories||{}).forEach(function(c){allCats[c]=true;});});
  var cats=Object.keys(allCats).sort(function(a,b){
    return periods.reduce(function(s,p){return s+(ms[p].categories[b]||0);},0)-periods.reduce(function(s,p){return s+(ms[p].categories[a]||0);},0);
  });
  var html='<div class="panel"><div class="ph2"><div class="ptitle">💳 Spending by Month</div><div class="pact">tap cell → transactions</div></div>';
  html+='<div style="overflow-x:auto"><table class="mtable"><thead><tr><th>Category</th>';
  periods.forEach(function(p){html+='<th>'+short(ms[p].label)+'</th>';});
  html+='<th>Total</th></tr></thead><tbody>';
  cats.forEach(function(cat){
    var col=CAT_COLORS[cat]||'#5e5e7a';
    var rowTotal=periods.reduce(function(s,p){return s+(ms[p].categories[cat]||0);},0);
    if(!rowTotal)return;
    html+='<tr><td style="color:'+col+'">'+cat+'</td>';
    periods.forEach(function(p){
      var a=ms[p].categories[cat]||0;
      if(a){
        var txns=JSON.stringify((ms[p].transactions||[]).filter(function(t){return t.category===cat;}));
        html+='<td class="hot" style="color:'+col+'" onclick="showTxns(\''+cat+' · '+short(ms[p].label)+'\','+txns+',\''+col+'\')">'+fmt(a)+'</td>';
      } else html+='<td class="zero">—</td>';
    });
    html+='<td style="color:'+col+';font-weight:600">'+fmt(rowTotal)+'</td></tr>';
  });
  html+='<tr class="total-row"><td>Total</td>';
  var grand=0;
  periods.forEach(function(p){var t=ms[p].total||0;grand+=t;html+='<td>'+fmt(t)+'</td>';});
  html+='<td>'+fmt(grand)+'</td></tr>';
  html+='</tbody></table></div></div>';
  set('mc',html);
}
function showTxns(title,txns,col){
  var total=txns.reduce(function(s,t){return s+t.amount;},0);
  var body='<div style="font-family:var(--mono);font-size:13px;color:'+col+';margin-bottom:10px">'+fmt2(total)+'</div>';
  txns.sort(function(a,b){return b.amount-a.amount;}).forEach(function(t){
    body+='<div class="txn-item"><span class="txn-date">'+t.date+'</span><span class="txn-desc">'+t.desc+'</span><span class="txn-amt" style="color:'+col+'">'+fmt2(t.amount)+'</span></div>';
  });
  openModal(title,txns.length+' transactions',body);
}

// ── TRANSACTIONS ──────────────────────────────────────────────
function rTransactions(){
  var ms=D.monthly_spending||{};
  var all=[];
  Object.values(ms).forEach(function(v){(v.transactions||[]).forEach(function(t){all.push(t);});});
  all.sort(function(a,b){return b.date<a.date?-1:1;});

  var html='<div class="panel"><div class="ph2"><div class="ptitle">📋 All Transactions</div><div class="pact">'+all.length+' total</div></div>';
  // Search box
  html+='<input id="txn-search" placeholder="Search transactions..." oninput="filterTxns()" style="width:100%;padding:7px;background:var(--s2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:10px;margin-bottom:10px">';
  html+='<div id="txn-list">';
  all.slice(0,100).forEach(function(t){
    var col=CAT_COLORS[t.category]||'#5e5e7a';
    html+='<div class="txn-item"><span class="txn-date">'+t.date+'</span><span class="txn-desc">'+t.desc+'</span><span class="txn-cat" style="color:'+col+'">'+t.category+'</span><span class="txn-amt" style="color:'+col+'">'+fmt2(t.amount)+'</span></div>';
  });
  if(all.length>100)html+='<div style="font-size:9px;color:var(--muted);padding:6px 0">Showing 100 of '+all.length+'. Search to filter.</div>';
  html+='</div></div>';
  set('mc',html);
  window._allTxns=all;
}
function filterTxns(){
  var q=(document.getElementById('txn-search').value||'').toLowerCase();
  var filtered=window._allTxns.filter(function(t){return !q||t.desc.toLowerCase().includes(q)||t.category.toLowerCase().includes(q);});
  var html='';
  filtered.slice(0,200).forEach(function(t){
    var col=CAT_COLORS[t.category]||'#5e5e7a';
    html+='<div class="txn-item"><span class="txn-date">'+t.date+'</span><span class="txn-desc">'+t.desc+'</span><span class="txn-cat" style="color:'+col+'">'+t.category+'</span><span class="txn-amt" style="color:'+col+'">'+fmt2(t.amount)+'</span></div>';
  });
  if(!html)html='<div style="font-size:10px;color:var(--muted);padding:6px">No results.</div>';
  set('txn-list',html);
}

  items.forEach(function(i){var a=ob[i.key]||0;if(!a)return;
    html+='<div class="acct-row"><div style="font-size:10px;font-weight:500">'+i.e+' '+i.name+'</div><div class="acct-amt" style="color:var(--pink)"><span class="sym">$</span>'+Number(a).toFixed(2)+'</div></div>';

  html+='</div>';
  set('mc',html);
}

// ── ANALYTICS ─────────────────────────────────────────────────
function rAnalytics(){
  var mh=D.monthly_history||[];
  var maxV=mh.reduce(function(m,r){return Math.max(m,r.income,r.outflows);},1);
  var html='<div class="panel"><div class="ph2"><div class="ptitle">📊 Monthly Cash Flow</div></div>';
  mh.slice(-6).reverse().forEach(function(m){
    var ip=Math.round(m.income/maxV*100),op=Math.round(m.outflows/maxV*100);
    html+='<div style="margin-bottom:12px">';
    html+='<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-bottom:3px"><span style="font-weight:500">'+m.period_label+'</span><span style="display:flex;gap:10px"><span style="color:var(--accent)">In '+fmt(m.income)+'</span><span style="color:var(--pink)">Out '+fmt(m.outflows)+'</span></span></div>';
    html+='<div style="height:7px;background:var(--s2);border-radius:4px;overflow:hidden;margin-bottom:3px"><div style="height:100%;width:'+ip+'%;background:var(--accent);border-radius:4px"></div></div>';
    html+='<div style="height:7px;background:var(--s2);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+op+'%;background:var(--pink);border-radius:4px"></div></div>';
    html+='</div>';
  });
  html+='</div>';
  // Spending by month
  var ms=D.monthly_spending||{};
  var sp=Object.keys(ms).sort().filter(function(p){return ms[p].total>0;});
  if(sp.length){
    html+='<div class="panel"><div class="ph2"><div class="ptitle">💳 Card Spending</div></div>';
    sp.reverse().forEach(function(p){
      html+='<div class="acct-row"><span style="font-size:10px">'+ms[p].label+'</span><span class="acct-amt" style="color:var(--blue)"><span class="sym">$</span>'+Number(ms[p].total).toLocaleString('en-US',{maximumFractionDigits:0})+'</span></div>';
    });
    html+='</div>';
  }
  set('mc',html);
}

// ── TRAVEL ────────────────────────────────────────────────────
function rTravel(){
  var all=(D.travel||[]).filter(function(t){return t.state&&['NJ','NY','CT','PA'].indexOf(t.state)<0;});
  if(!all.length){set('mc','<div class="panel"><div style="font-size:10px;color:var(--muted);padding:8px">No travel transactions found. Plaid includes location data when merchants provide it.</div></div>');return;}
  var byState={};
  all.forEach(function(t){
    var st=t.state;
    if(!byState[st])byState[st]={total:0,cities:{},online:[]};
    byState[st].total+=t.amount;
    if(t.city){
      if(!byState[st].cities[t.city])byState[st].cities[t.city]={txns:[],total:0};
      byState[st].cities[t.city].txns.push(t);byState[st].cities[t.city].total+=t.amount;
    } else byState[st].online.push(t);
  });
  var states=Object.keys(byState).sort(function(a,b){return byState[b].total-byState[a].total;});
  var grand=all.reduce(function(s,t){return s+t.amount;},0);
  var html='<div class="panel"><div class="ph2"><div class="ptitle">✈️ Travel Spending</div><div class="pact">'+states.length+' states · '+fmt(grand)+'</div></div>';
  html+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">';
  states.forEach(function(st){html+='<div style="background:var(--s2);border-radius:6px;padding:3px 8px;font-size:9px;color:var(--warn)">'+st+' <span style="color:var(--muted)">'+fmt(byState[st].total)+'</span></div>';});
  html+='</div></div>';
  states.forEach(function(st){
    var sv=byState[st];
    var months=[...new Set(all.filter(function(t){return t.state===st;}).map(function(t){return t.period_label;}))].join(', ');
    html+='<div style="background:var(--s2);border-radius:8px;padding:10px;margin-bottom:10px">';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    html+='<div style="font-family:var(--head);font-size:20px;font-weight:800;color:var(--warn);width:36px;text-align:center">'+st+'</div>';
    html+='<div style="flex:1"><div style="font-size:12px;font-weight:700">'+(STATE_NAMES[st]||st)+'</div><div style="font-size:9px;color:var(--muted)">'+months+'</div></div>';
    html+='<div style="font-family:var(--num);font-size:20px;color:var(--warn)">'+fmt(sv.total)+'</div></div>';
    Object.keys(sv.cities).sort(function(a,b){return sv.cities[b].total-sv.cities[a].total;}).forEach(function(city){
      var cv=sv.cities[city];
      html+='<div style="margin:6px 0 3px;padding:3px 0;border-top:1px solid var(--border2);display:flex;justify-content:space-between"><span style="font-size:10px;font-weight:600">📍 '+city+'</span><span style="font-size:10px;font-family:var(--mono);color:var(--warn)">'+fmt(cv.total)+'</span></div>';
      cv.txns.sort(function(a,b){return b.amount-a.amount;}).forEach(function(t){
        html+='<div style="display:flex;justify-content:space-between;font-size:9px;padding:2px 0;border-bottom:1px solid var(--border2);color:var(--muted)"><span>'+t.desc+'</span><span style="color:var(--warn)">'+fmt2(t.amount)+'</span></div>';
      });
    });
    if(sv.online.length){
      var ot=sv.online.reduce(function(s,t){return s+t.amount;},0);
      html+='<div style="margin:6px 0 3px;padding:3px 0;border-top:1px solid var(--border2);display:flex;justify-content:space-between"><span style="font-size:10px;color:var(--muted)">🌐 Online / '+st+'</span><span style="font-size:10px;font-family:var(--mono);color:var(--muted)">'+fmt(ot)+'</span></div>';
      sv.online.forEach(function(t){
        html+='<div style="display:flex;justify-content:space-between;font-size:9px;padding:2px 0;color:var(--muted2)"><span>'+t.desc+'</span><span>'+fmt2(t.amount)+'</span></div>';
      });
    }
    html+='</div>';
  });
  set('mc',html);
}

// ── SYNC ──────────────────────────────────────────────────────
async function triggerSync(){
  var btn=document.getElementById('sync-btn'),btnT=document.getElementById('sync-btn-top');
  if(btn){btn.textContent='⟳ Syncing...';btn.disabled=true;}
  if(btnT){btnT.textContent='⟳';btnT.disabled=true;}
  try{
    var r=await fetch(BACKEND_URL+'/api/sync',{method:'POST'});
    var d=await r.json();
    if(d.success){
      setTimeout(loadData,2000);
    } else {
      alert('Sync error: '+d.error);
    }
  } catch(e){
    alert('Sync failed: '+e.message);
  }
  if(btn){btn.textContent='⚡ Sync Now';btn.disabled=false;}
  if(btnT){btnT.textContent='⚡';btnT.disabled=false;}
}

// ── LOAD ──────────────────────────────────────────────────────
function loadData(){
  var btn=document.getElementById('refresh-btn');
  if(btn){btn.textContent='⟳ Loading...';btn.disabled=true;}
  fetch('./data.json?t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(data){
      D=data;
      buildNav('sidebar-nav',false);buildNav('drawer-nav',true);buildTabsBar();renderAll();
      var ts=D.generated_at?new Date(D.generated_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
      var gt=document.getElementById('gen-tag');if(gt)gt.textContent=ts;
      if(btn){btn.textContent='↻ Refresh';btn.disabled=false;}
    })
    .catch(function(err){
      set('mc','<div style="padding:20px;font-size:11px;color:var(--red)">Failed to load data.json: '+err+'</div>');
      if(btn){btn.textContent='↻ Refresh';btn.disabled=false;}
    });
}
loadData();
</script>
