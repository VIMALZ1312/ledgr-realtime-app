name: Deploy to Replit

on:
  push:
    branches: [main]
    paths:
      - 'server.js'
      - 'package.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Replit self-update
        run: |
          curl -s -X POST \
            "https://realtimefin.replit.app/api/update" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            --max-time 30 || true
          echo "Deploy triggered"
