<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#060608"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="28%" stop-color="#c8f060"/>
      <stop offset="60%" stop-color="#00d084"/>
      <stop offset="100%" stop-color="#00a8d0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(200,240,96,0)"/>
      <stop offset="30%" stop-color="#00d084" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#00a8d0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="rgba(0,168,208,0)"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d084" stop-opacity="0.0"/>
      <stop offset="70%" stop-color="#00d084" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#00d084" stop-opacity="0.12"/>
    </radialGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="4"/>
      <feComposite in2="SourceGraphic"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>
  
  <!-- Rounded background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  
  <!-- Glow overlay -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#glow)"/>
  
  <!-- Subtle border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="107" ry="107" 
        fill="none" stroke="rgba(0,208,132,0.22)" stroke-width="1.5"/>
  
  <!-- Inner highlight top-left -->
  <ellipse cx="180" cy="120" rx="140" ry="80" 
           fill="rgba(200,240,96,0.04)"/>
  
  <!-- LG text with gradient -->
  <text x="256" y="290" 
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="800"
        font-size="252"
        letter-spacing="-8"
        text-anchor="middle"
        fill="url(#textGrad)"
        filter="url(#textGlow)">LG</text>
  
  <!-- Accent underline -->
  <rect x="128" y="368" width="256" height="3" rx="2" fill="url(#lineGrad)"/>
  
  <!-- Small dots accent -->
  <circle cx="128" cy="369.5" r="3" fill="#00d084" opacity="0.7"/>
  <circle cx="384" cy="369.5" r="3" fill="#00a8d0" opacity="0.7"/>
</svg>