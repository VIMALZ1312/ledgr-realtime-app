<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LEDGR — Connect Bank</title>
<style>
body{background:#08080e;color:#eeeef8;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
.box{background:#121220;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:32px;width:340px;}
h2{font-family:sans-serif;font-weight:800;font-size:22px;margin-bottom:4px;color:#c8f060;}
.sub{font-size:10px;color:#5e5e7a;margin-bottom:24px;letter-spacing:1px;text-transform:uppercase;}
input{width:100%;padding:10px;background:#191926;border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#eeeef8;font-family:monospace;font-size:12px;margin-bottom:12px;box-sizing:border-box;}
button{width:100%;padding:11px;background:#c8f060;color:#08080e;border:none;border-radius:6px;font-weight:700;font-size:12px;cursor:pointer;margin-bottom:8px;font-family:monospace;}
button.sec{background:#191926;color:#c8f060;border:1px solid rgba(200,240,96,0.3);}
.status{font-size:10px;color:#5e5e7a;margin-top:12px;line-height:1.7;white-space:pre-wrap;word-break:break-all;}
.ok{color:#38d99a;}.err{color:#f05a5a;}.warn{color:#f0a020;}
.acct{background:#191926;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:10px;display:flex;justify-content:space-between;}
.acct-name{font-weight:600;color:#c8f060;}
.acct-bal{color:#5dd8f5;}
.step{font-size:9px;color:#5e5e7a;margin-bottom:16px;padding:10px;background:#0f0f17;border-radius:6px;border-left:2px solid #c8f060;line-height:1.8;}
</style>
</head>
<body>
<div class="box">
  <h2>LEDGR RT</h2>
  <div class="sub">Connect Bank Account</div>

  <div class="step">
    1. Enter nickname (bofa / wf / td / discover)<br>
    2. Tap Connect → complete bank login<br>
    3. Copy the token → add to Netlify env vars<br>
    4. Repeat for each bank<br>
    5. Tap Sync when all banks connected
  </div>

  <input id="nickname" placeholder="Nickname: bofa, wf, td, discover" />
  <button onclick="startLink()">🔗 Connect Bank</button>
  <button class="sec" onclick="triggerSync()">⚡ Sync All Banks Now</button>

  <div class="status" id="status">Enter a nickname then tap Connect.</div>
  <div id="accounts" style="margin-top:16px"></div>
</div>

<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<script>
async function startLink() {
  const nickname = document.getElementById('nickname').value.trim().toLowerCase();
  if (!nickname) { setStatus('Enter a nickname first.', 'err'); return; }
  setStatus('Getting link token...', 'warn');
  try {
    const r = await fetch('/.netlify/functions/create-link-token', { method: 'POST', headers: {'Content-Type':'application/json'} });
    const { link_token, error } = await r.json();
    if (error) throw new Error(JSON.stringify(error));
    const handler = Plaid.create({
      token: link_token,
      onSuccess: async (public_token, metadata) => {
        setStatus('Exchanging token...', 'warn');
        const resp = await fetch('/.netlify/functions/exchange-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ public_token, nickname })
        });
        const data = await resp.json();
        if (data.success) {
          setStatus('✓ Connected! Now add this to Netlify:\n\nSite settings → Environment variables → Add:\n\nKey:   PLAID_TOKEN_' + nickname.toUpperCase() + '\nValue: ' + data.access_token + '\n\nThen redeploy the site.', 'ok');
        } else {
          setStatus('Error: ' + JSON.stringify(data.error), 'err');
        }
      },
      onExit: (err) => { if (err) setStatus('Error: ' + err.display_message, 'err'); else setStatus('Cancelled.', 'warn'); },
    });
    handler.open();
  } catch (err) { setStatus('Error: ' + err.message, 'err'); }
}

async function triggerSync() {
  setStatus('Syncing all banks...', 'warn');
  try {
    const r = await fetch('/.netlify/functions/sync', { method: 'POST' });
    const d = await r.json();
    if (d.success) {
      setStatus('✓ Synced!\n' + d.accounts_synced + ' accounts\n' + d.transactions_synced + ' transactions\ndata.json pushed to GitHub ✓', 'ok');
      loadAccounts();
    } else {
      setStatus('Error: ' + d.error, 'err');
    }
  } catch (err) { setStatus('Error: ' + err.message, 'err'); }
}

async function loadAccounts() {
  // Show which tokens are configured via env
  const r = await fetch('/.netlify/functions/sync', { method: 'POST' }).catch(() => null);
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (cls || '');
}
</script>
</body>
</html>
